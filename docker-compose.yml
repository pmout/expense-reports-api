services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: expense_reports
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d expense_reports"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/ExpenseReports.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=expense_reports;Username=postgres;Password=postgres"
      Database__MigrateOnStartup: "true"
      Database__SeedOnStartup: "true"
      # Demo-only key; in production this comes from a secret store, never from source.
      Jwt__SigningKey: "compose-demo-signing-key-0123456789abcdef"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
